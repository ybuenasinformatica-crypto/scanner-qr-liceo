<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escáner QR - Registro</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 16px;
    }

    .box {
      max-width: 760px;
      margin: auto;
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
      margin-bottom: 8px;
    }

    p {
      margin-top: 0;
      color: #4b5563;
    }

    .modo {
      margin-top: 12px;
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 12px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      background: #ecfdf5;
      color: #166534;
    }

    .modo-desayuno { background:#fff7ed; color:#9a3412; }
    .modo-almuerzo { background:#ecfdf5; color:#166534; }
    .modo-cena { background:#eff6ff; color:#1d4ed8; }
    .modo-transporte_manana { background:#f5f3ff; color:#6d28d9; }
    .modo-transporte_tarde { background:#fdf2f8; color:#be185d; }
    .modo-asistencia,
    .modo-ingreso,
    .modo-biblioteca,
    .modo-otro { background:#f9fafb; color:#111827; }

    select, input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      font-size: 16px;
    }

    select, input {
      border: 1px solid #ccc;
      background: white;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn {
      background: #0b57d0;
      color: white;
    }

    .btn-sec {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-danger {
      background: #b91c1c;
      color: white;
    }

    .grid-3, .grid-2 {
      display: grid;
      gap: 10px;
    }

    .grid-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .grid-2 {
      grid-template-columns: 1fr 1fr;
    }

    #estado {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .ok { background:#dcfce7; color:#166534; }
    .error { background:#fee2e2; color:#991b1b; }
    .info { background:#dbeafe; color:#1d4ed8; }

    .camara-box, .ultimo {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    #reader {
      width: 100%;
      margin-top: 10px;
    }

    .pill {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e5e7eb;
      font-size: 13px;
      font-weight: bold;
    }

    #ultimoContenido {
      margin-top: 10px;
      line-height: 1.5;
    }

    #debug {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      word-break: break-word;
    }

    @media (max-width: 640px) {
      .grid-3, .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Escáner QR</h1>
    <p>Selecciona el tipo una vez y luego escanea varios QR seguidos.</p>

    <button onclick="activarSonido()" id="btnAudio" class="btn-sec">🔊 Activar sonido</button>

    <div id="modo" class="modo modo-almuerzo">MODO: ALMUERZO</div>

    <select id="tipo" onchange="actualizarModo()">
      <option value="desayuno">Desayuno</option>
      <option value="almuerzo" selected>Almuerzo</option>
      <option value="cena">Cena</option>
      <option value="transporte_manana">Transporte Mañana</option>
      <option value="transporte_tarde">Transporte Tarde</option>
      <option value="asistencia">Asistencia</option>
      <option value="ingreso">Ingreso</option>
      <option value="biblioteca">Biblioteca</option>
      <option value="otro">Otro</option>
    </select>

    <div class="grid-3">
      <button class="btn" onclick="iniciarEscaner()">📷 Iniciar escáner</button>
      <button class="btn-sec" onclick="pausarEscaner()">⏸️ Pausar / Reanudar</button>
      <button class="btn-danger" onclick="detenerEscaner()">⏹️ Detener</button>
    </div>

    <div id="estado"></div>

    <div class="camara-box">
      <strong>Escáner QR</strong>
      <div class="pill" id="estadoCamara">Cámara detenida</div>
      <div id="reader"></div>
    </div>

    <div class="ultimo">
      <strong>Último registro</strong>
      <div id="ultimoContenido">Aún no hay registros en esta sesión.</div>
    </div>

    <input id="idManual" placeholder="ID alumno (respaldo manual)" autocomplete="off" autocapitalize="characters" />

    <div class="grid-2">
      <button class="btn" onclick="registrarManual()">Registrar manualmente</button>
      <button class="btn-sec" onclick="limpiarManual()">Limpiar</button>
    </div>

    <div id="debug"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/a/macros/snaeduca.cl/s/AKfycbwQOGCzdQcUCPuCL9lizzi0H3qvJfa0zYS_hwScC41u7BqF9hbNFMg_e56Fvm1ZgcvE/exec";

    let audioContext = null;
    let audioHabilitado = false;

    let html5QrCode = null;
    let scannerActivo = false;
    let scannerPausado = false;

    let ultimoQrLeido = "";
    let ultimoRegistroTs = 0;
    const BLOQUEO_MS = 1800;

    function formatear(tipo) {
      return {
        desayuno: 'DESAYUNO',
        almuerzo: 'ALMUERZO',
        cena: 'CENA',
        transporte_manana: 'TRANSPORTE MAÑANA',
        transporte_tarde: 'TRANSPORTE TARDE',
        asistencia: 'ASISTENCIA',
        ingreso: 'INGRESO',
        biblioteca: 'BIBLIOTECA',
        otro: 'OTRO'
      }[tipo] || tipo;
    }

    function actualizarModo() {
      const t = document.getElementById("tipo").value;
      const box = document.getElementById("modo");
      box.className = "modo modo-" + t;
      box.textContent = "MODO: " + formatear(t);
    }

    function mostrar(msg, tipo = "info") {
      const e = document.getElementById("estado");
      e.style.display = "block";
      e.className = tipo;
      e.innerHTML = msg;
    }

    function setEstadoCamara(texto) {
      document.getElementById("estadoCamara").textContent = texto;
    }

    async function activarSonido() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;

        if (!AudioContextClass) {
          mostrar("Este navegador no soporta sonido web.", "error");
          return;
        }

        if (!audioContext) {
          audioContext = new AudioContextClass();
        }

        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        beep(880, 0.12, 0.08, "sine");
        audioHabilitado = true;
        document.getElementById("btnAudio").textContent = "🔊 Sonido activado";
        mostrar("Sonido activado correctamente.", "ok");
      } catch (error) {
        mostrar("No se pudo activar el sonido: " + error.message, "error");
      }
    }

    function beep(frequency, duration, volume, type = "sine") {
      if (!audioContext) return;

      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(frequency, audioContext.currentTime);

      gain.gain.setValueAtTime(0.001, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(volume, audioContext.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }

    function sonarBien() {
      if (!audioHabilitado) return;
      beep(1046, 0.10, 0.08, "sine");
      setTimeout(() => beep(1318, 0.14, 0.08, "sine"), 100);
    }

    function sonarMal() {
      if (!audioHabilitado) return;
      beep(220, 0.18, 0.08, "square");
    }

    function extraerIdDesdeQr(textoQr) {
      const texto = String(textoQr || "").trim();

      try {
        if (texto.startsWith("http://") || texto.startsWith("https://")) {
          const url = new URL(texto);
          const id = url.searchParams.get("id");
          if (id) return id.trim().toUpperCase();
        }
      } catch (e) {}

      return texto.toUpperCase();
    }

    function puedeProcesar(qrTexto) {
      const ahora = Date.now();

      if (qrTexto === ultimoQrLeido && (ahora - ultimoRegistroTs) < BLOQUEO_MS) {
        return false;
      }

      ultimoQrLeido = qrTexto;
      ultimoRegistroTs = ahora;
      return true;
    }

    function actualizarUltimoRegistro(r) {
      document.getElementById("ultimoContenido").innerHTML = `
        <strong>ID:</strong> ${r.alumno.id}<br>
        <strong>Nombre:</strong> ${r.alumno.nombre}<br>
        <strong>Curso:</strong> ${r.alumno.curso}<br>
        <strong>Tipo:</strong> ${r.tipo}<br>
        <strong>Hora:</strong> ${r.hora}<br>
        <strong>Fecha:</strong> ${r.fecha}
      `;
    }

    function enviarRegistro(idAlumno) {
      const tipo = document.getElementById("tipo").value;
      mostrar("Guardando registro...", "info");

      const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

      const params = new URLSearchParams({
        api: "registrar",
        idAlumno: idAlumno,
        tipo: tipo,
        observacion: "",
        callback: callbackName
      });

      const script = document.createElement("script");

      window[callbackName] = function(data) {
        try {
          if (data.ok) {
            sonarBien();
            mostrar("✅ " + data.mensaje, "ok");
            actualizarUltimoRegistro(data);
            document.getElementById("idManual").value = "";
          } else {
            sonarMal();
            mostrar("❌ " + data.mensaje, "error");
          }
        } finally {
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }
      };

      script.src = APPS_SCRIPT_URL + "?" + params.toString();

      script.onerror = function() {
        sonarMal();
        mostrar("Error al registrar: no se pudo conectar con Apps Script.", "error");
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      };

      document.body.appendChild(script);
    }

    function onScanSuccess(decodedText) {
      if (!scannerActivo || scannerPausado) return;

      const idAlumno = extraerIdDesdeQr(decodedText);

      document.getElementById("debug").innerHTML =
        "QR leído: " + decodedText + "<br>ID interpretado: " + idAlumno;

      if (!puedeProcesar(decodedText)) return;

      enviarRegistro(idAlumno);
    }

    async function iniciarEscaner() {
      try {
        if (scannerActivo && scannerPausado && html5QrCode) {
          await html5QrCode.resume();
          scannerPausado = false;
          setEstadoCamara("Escaneando");
          mostrar("Escáner reanudado.", "info");
          return;
        }

        if (scannerActivo) {
          mostrar("El escáner ya está activo.", "info");
          return;
        }

        html5QrCode = new Html5Qrcode("reader");

        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          mostrar("No se encontró ninguna cámara.", "error");
          return;
        }

        let cameraId = cameras[0].id;
        const trasera = cameras.find(c => /back|rear|environment|trasera/i.test(c.label || ""));
        if (trasera) cameraId = trasera.id;

        await html5QrCode.start(
          cameraId,
          {
            fps: 10,
            qrbox: { width: 260, height: 260 }
          },
          onScanSuccess,
          () => {}
        );

        scannerActivo = true;
        scannerPausado = false;
        setEstadoCamara("Escaneando");
        mostrar("Escáner iniciado correctamente.", "ok");
      } catch (error) {
        mostrar("No se pudo iniciar la cámara: " + error, "error");
        setEstadoCamara("Error de cámara");
        document.getElementById("debug").innerHTML = String(error);
      }
    }

    async function pausarEscaner() {
      try {
        if (!scannerActivo || !html5QrCode) {
          mostrar("El escáner no está activo.", "info");
          return;
        }

        if (scannerPausado) {
          await html5QrCode.resume();
          scannerPausado = false;
          setEstadoCamara("Escaneando");
          mostrar("Escáner reanudado.", "info");
        } else {
          await html5QrCode.pause();
          scannerPausado = true;
          setEstadoCamara("Pausado");
          mostrar("Escáner pausado.", "info");
        }
      } catch (error) {
        mostrar("No se pudo pausar o reanudar: " + error, "error");
      }
    }

    async function detenerEscaner() {
      try {
        if (!scannerActivo || !html5QrCode) {
          setEstadoCamara("Cámara detenida");
          return;
        }

        await html5QrCode.stop();
        await html5QrCode.clear();

        html5QrCode = null;
        scannerActivo = false;
        scannerPausado = false;
        document.getElementById("reader").innerHTML = "";

        setEstadoCamara("Cámara detenida");
        mostrar("Escáner detenido.", "info");
      } catch (error) {
        mostrar("No se pudo detener el escáner: " + error, "error");
      }
    }

    function registrarManual() {
      const id = document.getElementById("idManual").value.trim().toUpperCase();
      if (!id) {
        sonarMal();
        mostrar("Ingresa un ID.", "error");
        return;
      }

      enviarRegistro(id);
    }

    function limpiarManual() {
      document.getElementById("idManual").value = "";
      document.getElementById("idManual").focus();
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") registrarManual();
    });

    window.onload = () => {
      actualizarModo();
      setEstadoCamara("Cámara detenida");
      document.getElementById("idManual").focus();
    };
  </script>
</body>
</html>
